<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10 Bangkok Cofe Guide</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      color:white;
      background:#1f1613;
    }

    a{
      text-decoration:none;
    }

    /* Navbar */
    nav{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      background:rgba(255,255,255,0.14);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,0.16);
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .nav-container{
      max-width:1280px;
      margin:auto;
      padding:18px 34px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      color:white;
    }

    .brand-icon{
      width:46px;
      height:46px;
      border-radius:14px;
      background:linear-gradient(135deg,#5f3d2e,#a36f57);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:20px;
      box-shadow:0 10px 20px rgba(0,0,0,0.22);
      flex-shrink:0;
    }

    .brand-text h1{
      font-size:15px;
      line-height:1;
      letter-spacing:3px;
      font-weight:700;
    }

    .brand-text p{
      font-size:11px;
      margin-top:5px;
      color:rgba(255,255,255,0.78);
      letter-spacing:2px;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:38px;
      flex-wrap:wrap;
    }

    .menu a{
      color:rgba(255,255,255,0.88);
      font-size:15px;
      font-weight:500;
      position:relative;
      transition:0.25s ease;
    }

    .menu a:hover{
      color:white;
    }

    .menu a.active{
      color:white;
    }

    .menu a.active::after{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:-10px;
      width:34px;
      height:3px;
      border-radius:999px;
      background:white;
    }

    /* Hero */
    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      overflow:hidden;
    }

    .hero-bg{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      transition:background-image 1s ease-in-out;
      transform:scale(1.02);
    }

    .hero-bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(18,12,10,0.72) 0%, rgba(18,12,10,0.45) 38%, rgba(18,12,10,0.30) 100%),
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.28));
      pointer-events:none;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:1280px;
      margin:auto;
      width:100%;
      padding:120px 34px 60px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }

    .glass-box{
      max-width:620px;
      padding:42px 38px;
      border-radius:32px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.18);
      box-shadow:
        0 25px 50px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.12);
      position:relative;
      overflow:hidden;
    }

    .glass-box::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, rgba(255,255,255,0.12), transparent 35%, transparent 65%, rgba(255,255,255,0.08));
      pointer-events:none;
    }

    .hero-small{
      position:relative;
      z-index:1;
      font-size:13px;
      letter-spacing:3px;
      margin-bottom:14px;
      color:rgba(255,255,255,0.92);
    }

    .glass-box h2{
      position:relative;
      z-index:1;
      font-size:76px;
      line-height:0.95;
      font-weight:700;
      margin-bottom:18px;
      text-shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    .glass-box .highlight{
      color:#f5e6d3;
    }

    .hero-sub{
      position:relative;
      z-index:1;
      font-size:20px;
      color:rgba(255,255,255,0.95);
      line-height:1.8;
      margin-bottom:28px;
      max-width:500px;
      text-shadow:0 4px 16px rgba(0,0,0,0.28);
    }

    .hero-buttons{
      position:relative;
      z-index:1;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .btn-main{
      display:inline-block;
      padding:14px 26px;
      border-radius:999px;
      background:white;
      color:#2b211d;
      font-weight:600;
      box-shadow:0 12px 25px rgba(0,0,0,0.18);
      transition:0.25s ease;
    }

    .btn-main:hover{
      transform:translateY(-2px);
    }

    .btn-secondary{
      display:inline-block;
      padding:14px 26px;
      border-radius:999px;
      background:rgba(255,255,255,0.14);
      color:white;
      border:1px solid rgba(255,255,255,0.24);
      font-weight:500;
      transition:0.25s ease;
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,0.2);
    }

    /* Intro cards */
    .intro{
      position:relative;
      z-index:2;
      max-width:1280px;
      margin:-70px auto 0;
      padding:0 34px 30px;
    }

    .intro-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:22px;
    }

    .intro-card{
      padding:26px 24px;
      border-radius:28px;
      background:rgba(255,255,255,0.16);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.18);
      box-shadow:0 20px 40px rgba(0,0,0,0.16);
      color:white;
    }

    .intro-card h3{
      font-size:20px;
      margin-bottom:10px;
    }

    .intro-card p{
      font-size:14px;
      line-height:1.8;
      color:rgba(255,255,255,0.9);
    }

    /* Contact */
    .contact{
      max-width:1280px;
      margin:0 auto;
      padding:40px 34px 90px;
    }

    .contact-box{
      padding:34px 30px;
      border-radius:28px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.18);
      box-shadow:0 20px 40px rgba(0,0,0,0.16);
      color:white;
    }

    .contact-box h3{
      font-size:28px;
      margin-bottom:12px;
    }

    .contact-box p{
      font-size:15px;
      line-height:1.9;
      color:rgba(255,255,255,0.94);
    }

    footer{
      text-align:center;
      padding:0 20px 28px;
      color:rgba(255,255,255,0.75);
      font-size:13px;
    }

    @media (max-width: 1100px){
      .glass-box h2{
        font-size:58px;
      }

      .intro-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 768px){
      .nav-container{
        padding:16px 18px;
        flex-direction:column;
        gap:14px;
      }

      .menu{
        gap:22px;
        justify-content:center;
      }

      .hero-content,
      .intro,
      .contact{
        padding-left:18px;
        padding-right:18px;
      }

      .glass-box{
        padding:32px 22px;
      }

      .glass-box h2{
        font-size:42px;
      }

      .hero-sub{
        font-size:17px;
      }

      .intro{
        margin-top:-40px;
      }
    }
  </style>
</head>
<body>

 <nav>
    <div class="nav-container">
      <a href="index.html" class="brand">
        <div class="brand-icon">☕</div>
        <div class="brand-text">
          <h1>CAFE GUIDE</h1>
          <p>BANGKOK COLLECTION</p>
        </div>
      </a>

      <div class="menu">
  <a href="index.html" class="active">หน้าแรก</a>
  <a href="places.html">สถานที่</a>
  <a href="contact.html">ติดต่อ</a>
</div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-bg" id="heroBg"></div>

    <div class="hero-content">
      <div class="glass-box">
        <div class="hero-small">BANGKOK CAFE LIST</div>
        <h2>10 BANGKOK<br><span class="highlight">COFE GUIDE</span></h2>
        <div class="hero-sub">
          รวมคาเฟ่น่าไปในกรุงเทพ มู้ดดี ถ่ายรูปสวย
          ทั้งแนวมินิมอล อบอุ่น ธรรมชาติ และคาเฟ่ดีไซน์เรียบหรู
        </div>

        <div class="hero-buttons">
          <a href="places.html" class="btn-main">เข้าสู่เว็บไซต์</a>
          <a href="contact.html" class="btn-main">ติดต่อเรา</a>
        </div>
      </div>
    </div>
  </section>

  <script>
    const heroImages = [
      "11.jpg",
      "12.jpg",
      "13.jpg",
      "14.jpg"
    ];

    const heroBg = document.getElementById("heroBg");
    let current = 0;

    function changeHeroBackground() {
      heroBg.style.backgroundImage = `url('${heroImages[current]}')`;
      current = (current + 1) % heroImages.length;
    }
    changeHeroBackground();
    setInterval(changeHeroBackground, 3500);
  </script>

</body>
</html>
